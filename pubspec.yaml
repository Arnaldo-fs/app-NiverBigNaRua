name: app_aniversario
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 SUAS DEPENDÊNCIAS REAIS DO APP
  http: ^1.6.0
  csv: ^6.0.0

  # 🔔 NOTIFICAÇÕES
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 📱 ICONES (DEV DEPENDENCY)
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png


# ⚙️ CONFIG DO ÍCONE (FORA DO FLUTTER BLOCK)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"